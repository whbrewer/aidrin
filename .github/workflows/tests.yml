name: Run Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        extras: [""]
        include:
          # Test optional dependencies on a single fast combination
          - os: ubuntu-latest
            python-version: "3.12"
            extras: "[telemetry]"
          - os: ubuntu-latest
            python-version: "3.12"
            extras: "[globus]"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: ${{ matrix.python-version }}
        auto-update-conda: true
        channels: conda-forge
        activate-environment: aidrin

    - name: Conda info
      run: conda info

    - name: Conda list
      run: conda list

    - name: Ensure pip in conda env
      shell: bash -l {0}
      run: |
        conda install -n aidrin -c conda-forge pip -y

    - name: Install Dependencies
      shell: bash -l {0}
      run: |
        python --version
        which python
        python -m pip install --upgrade pip
        python -m pip install setuptools==70.0.0
        python -m pip install -e ".${{ matrix.extras }}"
        python -m pip install -e ".[dev]"

    - name: Run unit tests
      shell: bash -l {0}
      run: |
        python -c "import pkg_resources; print('pkg_resources found')"
        PYTHONPATH=. pytest tests/unit/ -v --cov=aidrin --cov=web --cov=worker --cov-report=term-missing

    - name: Run integration tests
      shell: bash -l {0}
      run: |
        PYTHONPATH=. pytest tests/integration/ -v --cov=aidrin --cov=web --cov=worker --cov-append --cov-report=term-missing
