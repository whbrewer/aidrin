name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: ${{ matrix.python-version }}
        auto-update-conda: true
        channels: conda-forge
        activate-environment: aidrin

    - name: Ensure pip in conda env
      shell: bash -l {0}
      run: |
        conda install -n aidrin -c conda-forge pip -y

    - name: Install package (editable)
      shell: bash -l {0}
      run: |
        python --version
        which python
        python -m pip install -e .

    - name: Build sdist and wheel
      shell: bash -l {0}
      run: |
        python -m pip install build
        python -m build

    - name: Verify wheel installs
      shell: bash -l {0}
      run: |
        python -m pip install dist/*.whl
        python -c "import aidrin; print('aidrin', aidrin.__version__)"
        python -c "import web; print('web package OK')"
