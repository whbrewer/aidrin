<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Homenaje&display=swap"
      rel="stylesheet"
    />
    <title>Homepage</title>
    <style>
      body {
        font-family: "Homenaje", sans-serif;
        font-weight: 400;
        font-style: normal;
        font-size: 30px;
        margin: 0;
        padding: 20px;
        padding-top: 50px;

        display: flex;
        flex-direction: row;
        /*background-color: rgba(255,245,220,255);*/
      }

      h1 {
        color: #212121;

        font-size: 6em;
        font-style: normal;
        font-weight: 400;
        line-height: normal;
      }
      .h1-container {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 1;

        border-radius: 20px;
        margin: 10px;
      }

      h2 {
        text-align: left;

        font-style: normal;
        font-weight: 400;
        line-height: normal;
        text-wrap: wrap;
        padding: 10px;
      }
      .h2-container {
        max-width: 800px;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }

      button {
        padding: 15px 30px;
        font-size: 1.5em;
        cursor: pointer;

        border: none;
        border-radius: 5px;
        transition: background-color 0.3s ease;
      }

      .button-container {
        display: flex;
        flex-direction: row;
        justify-content: center;
        flex-wrap: wrap;

        margin-top: 30px;
      }

      .button-container a {
        margin: 30px;
        text-decoration: none;
        display: inline-block;
      }
      button {
        cursor: pointer;
        border-radius: 20px;
        padding: 50px;
        font-family: "Homenaje", sans-serif;
        position: relative;
        overflow: hidden;
        color: black;

        transition: background 0.3s ease-in-out, color 0.3s ease-in-out;
      }

      button::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: transparent; /* Start with no background */
        opacity: 0; /* Initially hidden */
        transition: opacity 0.3s ease-in-out, background 0.3s ease-in-out;
        z-index: -1;
      }

      button:hover {
        color: white;
        background: transparent; /* Fade out the initial background */
      }

      button:hover::before {
        opacity: 1; /* Fade in the gradient */
        background: linear-gradient(
          135deg,
          rgba(216, 100, 112, 1),
          rgba(68, 133, 244, 1)
        );
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      /* I liked the animation */
      .animated {
        animation: fadeIn 2s ease-out;
      }
    </style>
  </head>
  <body class="animated">
    <div class="h1-container">
      <!-- patterns -->
      <img
        src="images/pattern1.png"
        style="
          position: absolute;
          bottom: 13vh;
          right: -4vw;
          opacity: 0.5;
          z-index: -1;
        "
      />
      <img
        src="images/pattern2.jpg"
        style="
          position: absolute;
          bottom: 80vh;
          right: -5vw;
          opacity: 0.3;
          z-index: -1;
        "
      />
      <img
        src="images/pattern3.png"
        style="
          position: absolute;
          top: 0vh;
          left: 0vw;
          opacity: 0.3;
          z-index: -1;
        "
      />
      <img
        src="images/pattern3.png"
        style="
          position: absolute;
          top: 40vh;
          left: 0vw;
          opacity: 0.3;
          z-index: -1;
        "
      />
      <img
        src="images/pattern3.png"
        style="
          position: absolute;
          top: 80vh;
          left: 0vw;
          opacity: 0.3;
          z-index: -1;
        "
      />
      <img
        src="images/pattern3.png"
        style="
          position: absolute;
          top: 0vh;
          left: 25vw;
          opacity: 0.3;
          z-index: -1;
        "
      />

      <img
        src="images/logo.png"
        alt="AIDRIn Logo"
        style="
          max-width: 600px;
          max-height: 600px;
          padding-left: 7vw;
          padding-top: 7vh;
        "
      />
    </div>
    <div
      style="display: flex; flex-direction: column; justify-content: center;"
    >
      <div class="h2-container">
        <h2>
          A framework that covers a broad range of readiness dimensions that
          aids in quantitatively and qualitatively evaluating the readiness of
          data.
        </h2>
      </div>

      <div class="button-container">
        <a href="{{ url_for('core.upload_file') }}">
          <button>Assess Data Readiness</button>
        </a>
      </div>
    </div>
    <!-- Package Version -->
    <div
      class="version-container"
      style="position: fixed; bottom: 10px; right: 10px;"
    >
      <p class="version-text" style="margin: 0px; font-size: 0.7em;">
        v{{ app_version }} |
        <a
          href="https://aidrin.readthedocs.io/en/latest/"
          target="_blank"
          style="text-decoration: none; color: #007bff;"
        >
          Docs
        </a>
      </p>
    </div>
  </body>
</html>
