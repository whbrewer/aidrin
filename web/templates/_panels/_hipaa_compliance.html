<!-- HIPAA Compliance metric panel -->
<div id="panel-hipaa-compliance" class="metric-panel hidden">
  <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm p-5">
    <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">HIPAA Compliance</h2>
    <form id="form-hipaa-compliance" method="post" enctype="multipart/form-data">
      <input type="file" id="file" name="file" style="display: none;" />
      <div id="checkboxContainer_hipaa" class="checkboxContainer">
        <div class="checkboxContainerIndividual">
          <label class="material-checkbox">
            <input type="checkbox" name="hipaa identifier scan" onchange="toggleValue(this)" />
            <span class="checkmark"></span>
            <span>Scan for HIPAA Identifiers</span>
          </label>
          <div class="metric-inputs mt-3 space-y-3" style="display: none;">
            <div>
              <label class="block text-sm font-medium mb-1.5 text-gray-900 dark:text-white">Columns to scan:</label>
              <div id="hipaa-identifiers-checkbox" class="w-full"></div>
            </div>
          </div>
          <div class="flex items-start gap-2 p-3 mt-3 text-sm text-blue-800 rounded-lg bg-blue-50 dark:bg-blue-900/20 dark:text-blue-400" role="alert">
            <svg class="w-4 h-4 mt-0.5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z"/></svg>
            <span>This scan detects <strong>8 key HIPAA-regulated identifiers</strong>, including potential SSNs, email addresses, phone/fax numbers, IP addresses, URLs, VINs, and medical or account identifiers. It also incorporates <strong>geographic database validation</strong> to flag potential US postal codes.</span>
          </div>
        </div>
      </div>
      <div class="flex items-center justify-end pt-4 mt-4 border-t border-gray-200 dark:border-gray-700">
        <button type="button" onclick="workspaceSubmit('/hipaa-compliance');"
                class="px-5 py-2.5 text-sm font-medium text-white rounded-lg cursor-pointer bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800 transition-colors">
          Submit
        </button>
      </div>
    </form>
  </div>
</div>
