<!-- Privacy Preservation metric panel (extracted from privacy_preservation.html) -->
<div id="panel-privacy-preservation" class="metric-panel hidden">
  <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm p-5">
    <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Privacy Preservation</h2>
    <form id="form-privacy-preservation" method="post" enctype="multipart/form-data">
      <input type="file" id="file" name="file" style="display: none;" />
    <div id="checkboxContainer_privacy" class="checkboxContainer">
      <br />
      <div class="checkboxContainerIndividual">
        <label class="material-checkbox" style="position: relative;">
          <input type="checkbox" name="differential privacy" onchange="toggleValue(this)" />
          <span class="checkmark"></span>
          <span style="display: inline-flex; align-items: center; gap: 4px;">
            <span>Differential privacy by adding laplacian noise:</span>
            <span class="info-icon">i<span class="info-text">Adds controlled noise to numerical features to protect individual privacy while maintaining data utility.
              <a href="{{ url_for('admin.privacy_metrics_docs') }}#differential-privacy" target="_blank" style="color: #4a90e2; font-style: italic;">See documentation</a></span></span>
          </span>
        </label>
        <div class="metric-inputs mt-3 space-y-3" style="display: none;">
          <div>
            <label class="block text-sm font-medium mb-1.5 text-gray-900 dark:text-white">Numerical features to add noise:</label>
            <div id="numFeaturesCheckbox2" class="w-full"></div>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1.5 text-gray-900 dark:text-white">Privacy budget (default epsilon=0.1):</label>
            <input class="textWrapper w-full" type="text" name="privacy budget" style="max-width: none;" />
          </div>
        </div>
      </div>

      <div class="checkboxContainerIndividual">
        <label class="material-checkbox" style="position: relative;">
          <input type="checkbox" name="single attribute risk score" onchange="toggleValue(this)" />
          <span class="checkmark"></span>
          <span style="display: inline-flex; align-items: center; gap: 4px;">
            <span>Evaluate single attribute risks:</span>
            <span class="info-icon">i<span class="info-text">Measures the risk of re-identification based on individual attributes.
              <a href="{{ url_for('admin.privacy_metrics_docs') }}#single-attribute-risk" target="_blank" style="color: #4a90e2; font-style: italic;">See documentation</a></span></span>
          </span>
        </label>
        <div class="metric-inputs mt-3 space-y-3" style="display: none;">
          <div>
            <label class="block text-sm font-medium mb-1.5 text-gray-900 dark:text-white">ID feature:</label>
            <select name="id feature to measure single attribute risk score" id="allFeaturesDropdownMMS" required class="w-full" style="max-width: none;"><option value="" disabled selected>Select a feature</option></select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1.5 text-gray-900 dark:text-white">Quasi identifiers:</label>
            <div id="catFeaturesCheckbox2" class="w-full"></div>
          </div>
        </div>
      </div>

      <div class="checkboxContainerIndividual">
        <label class="material-checkbox" style="position: relative;">
          <input type="checkbox" name="multiple attribute risk score" onchange="toggleValue(this)" />
          <span class="checkmark"></span>
          <span style="display: inline-flex; align-items: center; gap: 4px;">
            <span>Evaluate multiple attribute risks:</span>
            <span class="info-icon">i<span class="info-text">Assesses the combined risk of re-identification when multiple attributes are considered together.
              <a href="{{ url_for('admin.privacy_metrics_docs') }}#multiple-attribute-risk" target="_blank" style="color: #4a90e2; font-style: italic;">See documentation</a></span></span>
          </span>
        </label>
        <div class="metric-inputs mt-3 space-y-3" style="display: none;">
          <div>
            <label class="block text-sm font-medium mb-1.5 text-gray-900 dark:text-white">ID feature:</label>
            <select name="id feature to measure multiple attribute risk score" id="allFeaturesDropdownMMM" required class="w-full" style="max-width: none;"><option value="" disabled selected>Select a feature</option></select>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1.5 text-gray-900 dark:text-white">Quasi identifiers:</label>
            <div id="catFeaturesCheckbox3" class="w-full"></div>
          </div>
        </div>
      </div>

      <div class="checkboxContainerIndividual">
        <label class="material-checkbox" style="position: relative;">
          <input type="checkbox" name="entropy risk" onchange="toggleValue(this)" />
          <span class="checkmark"></span>
          <span style="display: inline-flex; align-items: center; gap: 4px;"><span>Compute Entropy Risk:</span>
            <span class="info-icon">i<span class="info-text">Estimates privacy risk by calculating the entropy of equivalence classes.
              <a href="{{ url_for('admin.privacy_metrics_docs') }}#entropy-risk" target="_blank" style="color: #4a90e2; font-style: italic;">See documentation</a></span></span>
          </span>
        </label>
        <div class="metric-inputs mt-3 space-y-3" style="display: none;">
          <div>
            <label class="block text-sm font-medium mb-1.5 text-gray-900 dark:text-white">Quasi-Identifiers:</label>
            <div id="entropyRiskQIsCheckbox" class="w-full"></div>
          </div>
        </div>
      </div>

      <div class="checkboxContainerIndividual">
        <label class="material-checkbox" style="position: relative;">
          <input type="checkbox" name="k-anonymity" onchange="toggleValue(this)" />
          <span class="checkmark"></span>
          <span style="display: inline-flex; align-items: center; gap: 4px;"><span>k-Anonymity:</span>
            <span class="info-icon">i<span class="info-text">Ensures each individual is indistinguishable from at least k others based on quasi-identifiers.
              <a href="{{ url_for('admin.privacy_metrics_docs') }}#k-anonymity" target="_blank" style="color: #4a90e2; font-style: italic;">See documentation</a></span></span>
          </span>
        </label>
        <div class="metric-inputs mt-3 space-y-3" style="display: none;">
          <div>
            <label class="block text-sm font-medium mb-1.5 text-gray-900 dark:text-white">Quasi-Identifiers:</label>
            <div id="kAnonymityQIsCheckbox" class="w-full"></div>
          </div>
        </div>
      </div>

      <div class="checkboxContainerIndividual">
        <label class="material-checkbox" style="position: relative;">
          <input type="checkbox" name="l-diversity" onchange="toggleValue(this)" />
          <span class="checkmark"></span>
          <span style="display: inline-flex; align-items: center; gap: 4px;"><span>l-Diversity:</span>
            <span class="info-icon">i<span class="info-text">Strengthens k-anonymity by requiring diverse sensitive values in each equivalence class.
              <a href="{{ url_for('admin.privacy_metrics_docs') }}#l-diversity" target="_blank" style="color: #4a90e2; font-style: italic;">See documentation</a></span></span>
          </span>
        </label>
        <div class="metric-inputs mt-3 space-y-3" style="display: none;">
          <div>
            <label class="block text-sm font-medium mb-1.5 text-gray-900 dark:text-white">Quasi-Identifiers:</label>
            <div id="lDiversityQIsCheckbox" class="w-full"></div>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1.5 text-gray-900 dark:text-white">Sensitive Attribute:</label>
            <select name="sensitive attribute for l-diversity" id="lDiversitySensitiveDropdown" required class="w-full" style="max-width: none;"><option value="" disabled selected>Select a feature</option></select>
          </div>
        </div>
      </div>

      <div class="checkboxContainerIndividual">
        <label class="material-checkbox" style="position: relative;">
          <input type="checkbox" name="t-closeness" onchange="toggleValue(this)" />
          <span class="checkmark"></span>
          <span style="display: inline-flex; align-items: center; gap: 4px;"><span>t-Closeness:</span>
            <span class="info-icon">i<span class="info-text">Requires the sensitive attribute distribution to be close to the overall distribution.
              <a href="{{ url_for('admin.privacy_metrics_docs') }}#t-closeness" target="_blank" style="color: #4a90e2; font-style: italic;">See documentation</a></span></span>
          </span>
        </label>
        <div class="metric-inputs mt-3 space-y-3" style="display: none;">
          <div>
            <label class="block text-sm font-medium mb-1.5 text-gray-900 dark:text-white">Quasi-Identifiers:</label>
            <div id="tClosenessQIsCheckbox" class="w-full"></div>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1.5 text-gray-900 dark:text-white">Sensitive Attribute:</label>
            <select name="sensitive attribute for t-closeness" id="tClosenessSensitiveDropdown" required class="w-full" style="max-width: none;"><option value="" disabled selected>Select a feature</option></select>
          </div>
        </div>
      </div>
    </div>
    <div class="flex items-center justify-end pt-4 mt-4 border-t border-gray-200 dark:border-gray-700">
      <button type="button" onclick="workspaceSubmit('/privacy-preservation');"
              class="px-5 py-2.5 text-sm font-medium text-white rounded-lg cursor-pointer bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800 transition-colors">
        Submit
      </button>
    </div>
    </form>
  </div>
</div>
