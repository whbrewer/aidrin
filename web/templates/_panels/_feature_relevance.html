<!-- Feature Relevance metric panel -->
<div id="panel-feature-relevance" class="metric-panel hidden">
  <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm p-5">
    <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Feature Relevance</h2>
    <form id="form-feature-relevance" method="post" enctype="multipart/form-data">
      <input type="file" id="file" name="file" style="display: none;" />
      <div id="checkbox-container-feature-relevance" class="checkboxContainer">
        <div class="checkboxContainerIndividual">
          <label class="material-checkbox">
            <input type="checkbox" name="feature relevancy" onchange="toggleValue(this)" />
            <span class="checkmark"></span>
            Check feature relevancy against target
            <span class="info-icon">i<span class="info-text">Calculates Pearson correlation coefficients between each feature and the target variable after minimal data cleaning (dropping missing values, one-hot encoding categorical features, and label encoding the target feature).</span></span>
          </label>
          <div class="mt-3 space-y-3">
            <div>
              <label class="block text-sm font-medium mb-1.5 text-gray-900 dark:text-white">Categorical features:</label>
              <div id="catFeaturesCheckbox1" class="w-full"></div>
            </div>
            <div>
              <label class="block text-sm font-medium mb-1.5 text-gray-900 dark:text-white">Numerical features:</label>
              <div id="numFeaturesCheckbox1" class="w-full"></div>
            </div>
            <div>
              <label class="block text-sm font-medium mb-1.5 text-gray-900 dark:text-white">Target feature:</label>
              <select name="target for feature relevance" id="all-features-dropdown-feature-relevance" required class="w-full" style="max-width: none;">
                <option value="" disabled selected>Select a feature</option>
              </select>
            </div>
          </div>
          <div class="flex items-start gap-2 p-3 mt-3 text-sm text-blue-800 rounded-lg bg-blue-50 dark:bg-blue-900/20 dark:text-blue-400" role="alert">
            <svg class="w-4 h-4 mt-0.5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z"/></svg>
            <span>Please select at least one categorical or numerical feature for analysis. The target feature should be different from the selected features.</span>
          </div>
        </div>
      </div>
      <div class="flex items-center justify-end pt-4 mt-4 border-t border-gray-200 dark:border-gray-700">
        <button type="button" onclick="workspaceSubmit('/feature-relevance');"
                class="px-5 py-2.5 text-sm font-medium text-white rounded-lg cursor-pointer bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800 transition-colors">
          Submit
        </button>
      </div>
    </form>
  </div>
</div>
