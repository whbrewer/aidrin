<!-- Data Overview panel: summary stats + histograms (loaded after file upload) -->
<div id="panel-data-overview" class="metric-panel">
  <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm p-5">
    <h2 class="text-lg font-semibold text-gray-900 dark:text-white mb-2">Data Overview</h2>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">
      Summary statistics and feature distributions for the uploaded dataset.
    </p>
    <!-- Stats cards + table rendered here by initWorkspace() -->
    <div id="workspace-summary" class="text-center py-8">
      <div role="status" class="inline-block">
        <svg class="w-8 h-8 text-gray-200 animate-spin dark:text-gray-600 fill-blue-600" viewBox="0 0 100 101"><path d="M100 50.59c0 27.61-22.39 50-50 50S0 78.2 0 50.59 22.39.59 50 .59s50 22.39 50 50zm-90.92 0c0 22.6 18.32 40.92 40.92 40.92s40.92-18.32 40.92-40.92S72.6 9.67 50 9.67 9.08 28 9.08 50.59z" fill="currentColor"/><path d="M93.97 39.04c2.43-.64 3.93-3.13 3.04-5.5A50 50 0 0048.44.58c-2.5.23-4.21 2.53-3.73 5l.02.1a3.89 3.89 0 004.57 3.13A41.1 41.1 0 0188.18 37.2a3.88 3.88 0 005.79 1.84z" fill="currentFill"/></svg>
      </div>
      <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">Loading summary statistics...</p>
    </div>
    <!-- Histograms rendered here by initWorkspace() -->
    <div id="workspace-histograms" class="mt-6"></div>
  </div>
</div>
